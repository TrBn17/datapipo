services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./var/minio:/data

  mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}); do sleep 2; done;
      /usr/bin/mc mb -p local/${S3_WAREHOUSE_BUCKET:-warehouse} || true;
      tail -f /dev/null
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    depends_on:
      - minio
      - mc
    environment:
      CATALOG_WAREHOUSE: s3://${S3_WAREHOUSE_BUCKET:-warehouse}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ENDPOINT_URL_S3: http://minio:9000
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "8181:8181"

  trino:
    image: trinodb/trino:477
    depends_on:
      - iceberg-rest
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog

  spark:
    image: tabulario/spark-iceberg:3.5.5_1.8.1
    depends_on:
      - iceberg-rest
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "4040:4040"
    volumes:
      - ./infra/spark/conf:/opt/spark/conf
      - ./scripts:/workspace/scripts
